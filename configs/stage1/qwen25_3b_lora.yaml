model_name_or_path: Qwen/Qwen2.5-3B-Base
output_dir: checkpoints/stage1/qwen25_3b_lora
train_file: artifacts/stage1/sft.jsonl
max_seq_length: 4096
learning_rate: 2.0e-5
num_train_epochs: 2
